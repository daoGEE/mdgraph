      <text x="30" y="164" fill="#8fa5be" font-size="19">Links · entities · provenance</text>
    </g>

    <path d="M802 439H865" stroke="#65a8ff" stroke-width="4" stroke-linecap="round"/>
    <path d="M853 427l14 12-14 12" fill="none" stroke="#65a8ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(888 345)" filter="url(#shadow)">
      <rect width="300" height="188" rx="24" fill="#10263e" stroke="#7bb8ff" stroke-opacity="0.22"/>
      <rect x="30" y="29" width="108" height="72" rx="12" fill="#07111f" stroke="#65a8ff" stroke-opacity="0.65"/>
      <circle cx="48" cy="47" r="4" fill="#ff7d87"/>
