<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66e3c4"/>
      <stop offset="1" stop-color="#65a8ff"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#9cc8ff" stroke-opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="28" fill="url(#grid)"/>
  <circle cx="1110" cy="80" r="260" fill="#3d8dff" opacity="0.08"/>
  <circle cx="170" cy="620" r="250" fill="#43e0b7" opacity="0.07"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(92 78)">
      <rect width="64" height="64" rx="16" fill="url(#accent)"/>
      <path d="M18 43V21l14 13 14-13v22" fill="none" stroke="#07111f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="49" fill="#f4f8ff" font-size="52" font-weight="760" letter-spacing="-1.5">MDGraph</text>
      <rect x="330" y="12" width="86" height="40" rx="20" fill="#66e3c4" fill-opacity="0.12" stroke="#66e3c4" stroke-opacity="0.45"/>
      <text x="373" y="39" text-anchor="middle" fill="#7af0d1" font-size="20" font-weight="700">1.0</text>
    </g>

    <text x="92" y="230" fill="#f4f8ff" font-size="54" font-weight="760" letter-spacing="-1.6">Markdown → Graph → Agent Context</text>
    <text x="92" y="279" fill="#a9bad0" font-size="26" font-weight="450">Local-first. Deterministic. Explainable.</text>

    <g transform="translate(92 345)" filter="url(#shadow)">
      <rect width="300" height="188" rx="24" fill="#10263e" stroke="#7bb8ff" stroke-opacity="0.22"/>
      <rect x="30" y="29" width="58" height="70" rx="9" fill="#65a8ff" fill-opacity="0.14" stroke="#65a8ff"/>
      <path d="M72 29v17h16" fill="none" stroke="#65a8ff" stroke-width="3"/>
      <text x="59" y="76" text-anchor="middle" fill="#d9eaff" font-size="19" font-weight="800">MD</text>
      <text x="30" y="132" fill="#f4f8ff" font-size="27" font-weight="700">Project Markdown</text>
      <text x="30" y="164" fill="#8fa5be" font-size="19">ADRs · specs · runbooks</text>
    </g>

    <path d="M414 439H477" stroke="#66e3c4" stroke-width="4" stroke-linecap="round"/>
    <path d="M465 427l14 12-14 12" fill="none" stroke="#66e3c4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(500 345)" filter="url(#shadow)">
      <rect width="280" height="188" rx="24" fill="#10263e" stroke="#66e3c4" stroke-opacity="0.24"/>
      <g transform="translate(31 28)" fill="none" stroke="#66e3c4" stroke-width="3">
        <path d="M30 34L86 18l48 38-62 43-42-65Z" opacity="0.7"/>
        <path d="M86 18L72 99M30 34l104 22" opacity="0.45"/>
